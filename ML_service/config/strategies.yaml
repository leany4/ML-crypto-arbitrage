strategies:
  q35_baseline:
    enabled: true
    pair_types:
      - perp_perp_cross_exchange
    opportunity_source: q35_perp.watch_q35_bps
    opportunity_min_bps: 70.0
    entry_probability_source: null
    entry_probability_min: null
    exit_probability_source: null
    exit_probability_min: null
    exit_advantage_source: null
    exit_advantage_max_bps: null
    max_hold_ms: 300000
    execution_delay_ms: 100
    notional_usd: 100.0

  transformer_full:
    enabled: false
    pair_types:
      - perp_perp_cross_exchange
    opportunity_source: transformer.watch_q35_bps
    opportunity_min_bps: 50.0
    entry_probability_source: transformer.enter_probability
    entry_probability_min: 0.70
    exit_probability_source: transformer.exit_probability
    exit_probability_min: 0.70
    exit_advantage_source: transformer.exit_advantage_bps
    exit_advantage_min_bps: 0.0
    max_hold_ms: 300000
    execution_delay_ms: 100
    notional_usd: 100.0

  hybrid_q35_transformer:
    enabled: false
    pair_types:
      - perp_perp_cross_exchange
    opportunity_source: q35_perp.watch_q35_bps
    opportunity_min_bps: 70.0
    entry_probability_source: transformer.enter_probability
    entry_probability_min: 0.70
    entry_executable_source: transformer.entry_executable_probability
    entry_executable_min: 0.80
    enter_advantage_source: transformer.enter_advantage_q35_bps
    enter_advantage_min_bps: 0.0
    exit_probability_source: transformer.exit_probability
    exit_probability_min: 0.70
    exit_advantage_source: transformer.exit_advantage_bps
    exit_advantage_min_bps: 0.0
    max_hold_ms: 300000
    execution_delay_ms: 100
    notional_usd: 100.0

  rl_paper:
    enabled: true
    pair_types:
      - perp_perp_cross_exchange
    gate_sources:
      perp_perp_cross_exchange: q35_perp.watch_q35_bps
    action_source: rl_agent.action
    emergency_stop_bps: -300.0
    cooldown_steps: 100
    session_reset_ms: 1800000
    max_hold_ms: 1800000
    execution_delay_ms: 100
    notional_usd: 100.0
