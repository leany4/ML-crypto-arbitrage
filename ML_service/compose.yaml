services:
  ml-service:
    build:
      context: .
    image: arb-ml-service:local
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      ML_DEVICE: ${ML_DEVICE:-auto}
      ML_OHLCV_MODE: ${ML_OHLCV_MODE:-disabled}
      ML_OHLCV_PATH: ${ML_OHLCV_PATH:-/replay/ohlcv_raw.parquet}
      ML_PAPER_STORE: ${ML_PAPER_STORE:-memory}
    ports:
      - "${ML_PORT:-8080}:8080"
    volumes:
      - ./config:/app/config:ro
      - ./models:/models:ro
      - ./state:/state
      - ./market_replay_data/raw_last_3d:/replay:ro
    stop_grace_period: 30s

  market-simulator:
    profiles:
      - replay
    build:
      context: ../market_simulator
    image: arb-market-simulator:local
    environment:
      SIM_DATA_DIR: /data
      SIM_PREPARED_DIR: /prepared
      SIM_ML_URL: http://ml-service:8080
      SIM_DEFAULT_SPEED: ${SIM_DEFAULT_SPEED:-1}
      SIM_DEFAULT_DURATION_SECONDS: ${SIM_DEFAULT_DURATION_SECONDS:-900}
    ports:
      - "${SIM_PORT:-8090}:8090"
    volumes:
      - ./market_replay_data/raw_last_3d:/data:ro
      - ./simulator_state:/prepared
    depends_on:
      ml-service:
        condition: service_healthy

  dashboard-service:
    build:
      context: ../dashboard_service
    image: arb-dashboard-service:local
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    depends_on:
      ml-service:
        condition: service_healthy
